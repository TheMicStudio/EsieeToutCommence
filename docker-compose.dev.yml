services:
  # ── 1. Migration (profil séparé) ──────────────────────────────────────────
  # Lance avec : docker compose -f docker-compose.dev.yml --profile migrate up
  # Nécessite SUPABASE_DB_URL dans .env
  migrate:
    profiles: [migrate]
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./supabase:/app/supabase
    command: >
      sh -c "npm install -g supabase 2>/dev/null &&
             supabase db push --db-url \"$$SUPABASE_DB_URL\" 2>&1"
    environment:
      SUPABASE_DB_URL: ${SUPABASE_DB_URL:-}
    restart: "no"

  # ── 2. App Next.js en mode dev (hot-reload) ───────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: hub-ecole-dev
    ports:
      - "3000:3000"
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./next.config.ts:/app/next.config.ts
      - ./tsconfig.json:/app/tsconfig.json
      - ./postcss.config.mjs:/app/postcss.config.mjs
      - hub_ecole_node_modules:/app/node_modules
      - hub_ecole_next_cache:/app/.next
    env_file:
      - .env
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    restart: unless-stopped

volumes:
  hub_ecole_node_modules:
  hub_ecole_next_cache:
