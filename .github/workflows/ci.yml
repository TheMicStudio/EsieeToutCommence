name: CI — Lint, Build & SonarCloud

on:
  push:
    branches: ["main", "feat/**"]
  pull_request:
    branches: ["main"]

jobs:
  ci:
    name: Lint + Build + SonarCloud
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout du code (avec historique complet pour SonarCloud)
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      # 3. Installation des dépendances
      - name: Install dependencies
        run: npm ci

      # 4. Lint (ESLint — next lint supprimé dans Next.js 16)
      - name: Lint
        run: npm run lint

      # 5. Vérification TypeScript
      - name: TypeScript check
        run: npx tsc --noEmit

      # 6. Build Next.js
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      # 7. Analyse SonarCloud
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
